name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy (fetch-model, default)
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Clippy (embed-model)
        run: cargo clippy --all-targets --locked --no-default-features --features embed-model -- -D warnings
      - name: Package (crates.io size and manifest gate)
        run: cargo package --locked

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      # embed-model keeps tests hermetic: no model download at test time.
      - name: Test
        run: cargo test --locked --no-default-features --features embed-model
